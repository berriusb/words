<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>책 제목 & 작가 매칭 게임</title>
    <style>
        /* CSS 스타일 정의 */
        
        /* --- 색상 변수 정의 (메인 컬러 반영) --- */
        :root {
            --main-color: #0080FF; /* 요청하신 메인 컬러 */
            --main-color-hover: #3399FF; /* 호버 시 약간 밝게 */
            --main-color-active: #0066CC; /* 클릭 시 약간 어둡게 */
            --main-color-light: #E6F2FF; /* 선택된 카드 배경용 아주 연한 파랑 */
            
            --bg-color: #f0f2f5;
            --text-color-primary: #333;
            --text-color-secondary: #666;
            --card-bg: white;
            --card-border: #ddd;
            --incorrect-color: #ea2b2b; /* 틀렸을 때 빨간색 (유지) */
            --incorrect-bg: #ffefef;
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            color: var(--text-color-primary);
        }

        h1 {
            margin-bottom: 10px;
            text-align: center;
        }

        .description {
            color: var(--text-color-secondary);
            margin-bottom: 30px;
            text-align: center;
            max-width: 400px;
        }

        /* 공통 버튼 스타일 (메인 컬러 반영 및 3D 효과) */
        .btn-primary {
            background-color: var(--main-color);
            color: white;
            border: none;
            border-bottom: 4px solid var(--main-color-active); /* 3D 효과 피벗 */
            border-radius: 12px;
            padding: 14px 28px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.1s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-primary:hover {
            background-color: var(--main-color-hover);
        }

        .btn-primary:active {
            border-bottom-width: 0;
            transform: translateY(4px); /* 클릭 시 들어가는 효과 */
        }

        /* --- 화면 섹션 스타일 --- */
        .screen {
            display: none; /* 기본적으로 숨김 */
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 800px;
        }

        /* 시작 화면 */
        #start-screen {
            display: flex; /* 처음에만 보이도록 설정 */
        }

        /* 게임 화면 (게임 보드) */
        #game-screen {
            /* display: flex; (JS에서 제어) */
        }

        /* 결과 화면 */
        #result-screen {
            /* display: flex; (JS에서 제어) */
            text-align: center;
        }

        /* --- 게임 보드 및 카드 스타일 (메인 컬러 반영) --- */
        #game-board {
            display: grid;
            grid-template-columns: repeat(4, 1fr); /* 4열 */
            gap: 15px;
            width: 90%;
            margin-top: 20px;
        }

        .card {
            background-color: var(--card-bg);
            border: 2px solid var(--card-border);
            border-bottom-width: 4px; /* 약간의 3D 효과 */
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.1s ease;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 90px;
            user-select: none;
            font-weight: 500;
            font-size: 1.05em;
        }

        .card:hover:not(.matched):not(.selected) {
            border-color: #aaa;
            background-color: #fafafa;
        }

        /* 선택된 카드 스타일 (메인 컬러 반영) */
        .card.selected {
            background-color: var(--main-color-light); /* 연한 메인 컬러 배경 */
            border-color: var(--main-color); /* 메인 컬러 테두
