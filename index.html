<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>책 제목 & 작가 매칭 게임 (중복 제거)</title>
    
    <style>
        /* --- 색상 변수 정의 (메인 컬러 반영) --- */
        :root {
            --main-color: #0080FF; /* 요청하신 메인 파란색 */
            --main-color-hover: #3399FF; /* 호버 시 약간 밝게 */
            --main-color-active: #0066CC; /* 클릭 시 약간 어둡게 */
            --main-color-light: #E6F2FF; /* 선택된 카드 배경용 아주 연한 파랑 */
            
            --bg-color: #f0f2f5;
            --text-color-primary: #333;
            --text-color-secondary: #666;
            --card-bg: white;
            --card-border: #ddd;
            --incorrect-color: #ea2b2b; /* 틀렸을 때 빨간색 (유지) */
            --incorrect-bg: #ffefef;
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            color: var(--text-color-primary);
        }

        h1 {
            margin-bottom: 10px;
            text-align: center;
        }

        .description {
            color: var(--text-color-secondary);
            margin-bottom: 30px;
            text-align: center;
            max-width: 400px;
        }

        /* 공통 버튼 스타일 (메인 컬러 반영 및 3D 효과) */
        .btn-primary {
            background-color: var(--main-color);
            color: white;
            border: none;
            border-bottom: 4px solid var(--main-color-active);
            border-radius: 12px;
            padding: 14px 28px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.1s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-primary:hover {
            background-color: var(--main-color-hover);
        }

        .btn-primary:active {
            border-bottom-width: 0;
            transform: translateY(4px);
        }

        /* --- 화면 섹션 스타일 --- */
        .screen {
            display: none; /* 기본적으로 숨김 */
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 800px;
        }

        /* 시작 화면 */
        #start-screen {
            display: flex; /* 처음에만 보이도록 설정 */
        }

        /* 게임 화면 (게임 보드) */
        #game-screen {
            /* display: flex; (JS에서 제어) */
        }

        /* 결과 화면 */
        #result-screen {
            /* display: flex; (JS에서 제어) */
            text-align: center;
        }

        /* --- 게임 보드 및 카드 스타일 (메인 컬러 반영) --- */
        #game-board {
            display: grid;
            grid-template-columns: repeat(4, 1fr); /* 4열 */
            gap: 15px;
            width: 90%;
            margin-top: 20px;
        }

        .card {
            background-color: var(--card-bg);
            border: 2px solid var(--card-border);
            border-bottom-width: 4px; /* 약간의 3D 효과 */
            border-radius: 16px;
            padding: 15px; /* 패딩 약간 줄임 (글자 길어질 것에 대비) */
            text-align: center;
            cursor: pointer;
            transition: all 0.1s ease;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 80px; /* 최소 높이 약간 줄임 */
            user-select: none;
            font-weight: 500;
            font-size: 1.05em;
            word-break: keep-all; /* 단어 단위 줄바꿈 */
        }

        .card:hover:not(.matched):not(.selected) {
            border-color: #aaa;
            background-color: #fafafa;
        }

        /* 선택된 카드 스타일 (메인 컬러 반영) */
        .card.selected {
            background-color: var(--main-color-light);
            border-color: var(--main-color);
            color: var(--main-color-active);
            box-shadow: 0 4px 10px rgba(0, 128, 255, 0.15);
        }

        /* 매칭된 카드 스타일 (투명해지며 클릭 불가) */
        .card.matched {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            transform: scale(0.9);
        }

        /* 틀렸을 때 흔들리는 애니메이션 (유지) */
        .card.incorrect {
            animation: shake 0.4s ease-in-out;
            border-color: #ffc1c1;
            background-color: var(--incorrect-bg);
            color: var(--incorrect-color);
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-6px); }
            40%, 80% { transform: translateX(6px); }
        }

        /* 제목 카드와 작가 카드를 시각적으로 약간 다르게 구분 (유지) */
        .card[data-type="title"] {
            color: #222;
        }
        .card[data-type="author"] {
            color: #555;
            font-style: italic;
        }

        /* 결과 메시지 스타일 (메인 컬러 반영) */
        #result-screen h2 {
            color: var(--main-color);
            margin-bottom: 10px;
            font-size: 2em;
        }
        #result-screen p {
            color: var(--text-color-secondary);
            margin-bottom: 30px;
            font-size: 1.2em;
        }

        /* 반응형 레이아웃: 화면이 작아지면 2열로 변경 */
        @media (max-width: 600px) {
            #game-board {
                grid-template-columns: repeat(2, 1fr);
                gap: 10px;
            }
            .card {
                padding: 12px;
                min-height: 60px;
                font-size: 0.95em;
                border-radius: 12px;
            }
            #result-screen h2 {
                font-size: 1.5em;
            }
        }
    </style>
</head>
<body>

    <div id="start-screen" class="screen">
        <h1>책 & 작가 맞추기</h1>
        <p class="description">듀오링고 스타일로 즐기는 문학 퀴즈!<br>중복 없이 고유한 항목들을 매칭해 보세요.</p>
        <button id="start-btn" class="btn-primary">게임 시작</button>
    </div>

    <div id="game-screen" class="screen">
        <div id="game-board"></div>
    </div>

    <div id="result-screen" class="screen">
        <h2>대단해요! 🎉</h2>
        <p>모든 문학 짝꿍을 찾았습니다.</p>
        <button id="restart-btn" class="btn-primary">다시 하기</button>
    </div>

    <script>
        // --- 1. 고유한 게임 데이터 정의 (중복 제거 핵심) ---
        
        // 고유한 책 제목 배열
        const bookTitles = [
            "달려라, 아비",
            "두근두근 내 인생",
            "채식주의자",
            "소년이 온다",
            "파친코",
            "저주토끼"
        ];

        // 고유한 작가 배열 (중복 없음)
        const authors = [
            "김애란",
            "한강",
            "이민진", 
            "정보라"
        ];

        // 책 제목 -> 정답 작가 매핑 데이터 (매칭 확인용)
        const bookToAuthorMap = {
            "달려라, 아비": "김애란",
            "두근두근 내 인생": "김애란",
            "채식주의자": "한강",
            "소년이 온다": "한강",
            "파친코": "이민진",
            "저주토끼": "정보라"
        };

        let cards = []; // 전체 카드 데이터를 담을 배열
        let firstSelectedCard = null; // 첫 번째로 선택한 카드 DOM 요소
        let secondSelectedCard = null; // 두 번째로 선택한 카드 DOM 요소
        let matchedTitlesCount = 0; // 맞춘 책 제목의 개수 (게임 종료 조건)
        let isChecking = false; // 매칭 확인 중 클릭 방지 플래그

        // DOM 요소들
        const startScreen = document.getElementById('start-screen');
        const gameScreen = document.getElementById('game-screen');
        const resultScreen = document.getElementById('result-screen');
        const gameBoard = document.getElementById('game-board');
        
        const startBtn = document.getElementById('start-btn');
        const restartBtn = document.getElementById('restart-btn');

        // 버튼 이벤트 리스너 등록
        startBtn.addEventListener('click', startGame);
        restartBtn.addEventListener('click', startGame); 

        // 2. 배열을 무작위로 섞는 함수 (Fisher-Yates Shuffle)
        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        // 3. 화면 전환 함수
        function showScreen(screenToShow) {
            startScreen.style.display = 'none';
            gameScreen.style.display = 'none';
            resultScreen.style.display = 'none';
            screenToShow.style.display = 'flex';
        }

        // 4. 게임 시작 및 초기화 함수
        function startGame() {
            showScreen(gameScreen);

            gameBoard.innerHTML = ''; 
            cards = [];
            firstSelectedCard = null;
            secondSelectedCard = null;
            matchedTitlesCount = 0;
            isChecking = false;

            // --- 데이터 준비: 고유한 제목과 고유한 작가 카드를 각각 생성 ---
            
            // 제목 카드 생성
            bookTitles.forEach(title => {
                cards.push({
                    text: title,
                    type: 'title'
                });
            });

            // 작가 카드 생성 (중복 없음)
            authors.forEach(author => {
                cards.push({
                    text: author,
                    type: 'author'
                });
            });

            // 카드 셔플
            shuffle(cards);

            // HTML 카드 요소 생성 및 보드에 추가
            cards.forEach(cardData => {
                const cardEl = document.createElement('div');
                cardEl.classList.add('card');
                cardEl.dataset.text = cardData.text; // HTML data 속성에 텍스트 저장
                cardEl.dataset.type = cardData.type; // HTML data 속성에 타입 저장
                cardEl.textContent = cardData.text;
                
                // 클릭 이벤트 리스너 등록
                cardEl.addEventListener('click', handleCardClick);
                
                gameBoard.appendChild(cardEl);
            });
        }

        // 5. 카드 클릭 핸들러 함수
        function handleCardClick(e) {
            const clickedCard = e.currentTarget;

            // 클릭 무시 조건: 
            if (clickedCard.classList.contains('matched') || 
                clickedCard.classList.contains('selected') || 
                isChecking) {
                return;
            }

            // 첫 번째 카드 선택
            if (!firstSelectedCard) {
                firstSelectedCard = clickedCard;
                firstSelectedCard.classList.add('selected');
            } 
            // 두 번째 카드 선택
            else {
                // 타입이 같은 카드를 연속으로 선택했을 경우, 첫 번째 선택을 교체
                if (firstSelectedCard.dataset.type === clickedCard.dataset.type) {
                    firstSelectedCard.classList.remove('selected');
                    firstSelectedCard = clickedCard;
                    firstSelectedCard.classList.add('selected');
                    return;
                }

                secondSelectedCard = clickedCard;
                secondSelectedCard.classList.add('selected');
                isChecking = true; // 클릭 방지 시작

                // 매칭 확인
                checkMatch();
            }
        }

        // 6. 매칭 확인 함수 (중복 제거에 맞춰 로직 변경)
        function checkMatch() {
            let titleCard, authorCard;

            // 선택된 카드 중 어느 것이 제목이고 어느 것이 작가인지 구분
            if (firstSelectedCard.dataset.type === 'title') {
                titleCard = firstSelectedCard;
                authorCard = secondSelectedCard;
            } else {
                titleCard = secondSelectedCard;
                authorCard = firstSelectedCard;
            }

            const selectedTitle = titleCard.dataset.text;
            const selectedAuthor = authorCard.dataset.text;
            const correctAuthor = bookToAuthorMap[selectedTitle]; // 선택된 제목의 정답 작가 찾기

            // --- 짝이 맞는지 확인 조건 (새로운 로직) ---
            // 선택된 제목의 정답 작가와 선택된 작가 카드의 텍스트가 일치해야 함
            if (selectedAuthor === correctAuthor) {
